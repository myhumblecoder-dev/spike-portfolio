name: CD

# GitFlow: `main` is the release branch — every push to main deploys to Vercel
# production. Auth + targeting come from CI secrets:
#   VERCEL_TOKEN      (org secret)  — Vercel auth
#   VERCEL_ORG_ID     (org secret)  — the team/account
#   VERCEL_PROJECT_ID (repo secret) — this project
# Deploys via the Vercel CLI + token, so it needs no Vercel↔GitHub App.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      # prisma generate (postinstall) loads prisma.config.ts, which reads
      # DATABASE_URL at config-load time — a placeholder lets the build run.
      # The DEPLOYED app uses the DATABASE_URL set on the Vercel project.
      DATABASE_URL: postgresql://user:password@localhost:5432/db
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
