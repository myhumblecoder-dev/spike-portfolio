name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      # `postinstall: prisma generate` loads prisma.config.ts, which reads
      # env("DATABASE_URL") at config-load time and throws if it's absent —
      # even though `generate` never opens a connection. A dummy placeholder
      # satisfies the load so install/lint/build/test can run on CI (which has
      # no real database). Matches the postgresql provider the stack provisions.
      DATABASE_URL: postgresql://user:password@localhost:5432/db
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm test -- --run
